name: Release

# Build and publish to the GitHub Releases page on every push to main.
# Versioning is fully automatic from conventional-commit messages — feat → minor,
# fix → patch (BREAKING CHANGE → major) — so no version is ever edited in repo
# files. The computed version is injected into the build via electron-builder's
# extraMetadata; the tag + release are created by the publish step.
on:
  push:
    branches: [main]

permissions:
  contents: write # create tags and releases

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for version computation

      # Compute the next semver from commits since the last tag. dry_run means
      # this only calculates — the tag itself is created by the publish step,
      # so a failed build never leaves an orphan tag. default_bump: false skips
      # the release entirely when no feat/fix commit warrants one.
      - name: Compute next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false
          fetch_all_tags: true
          dry_run: true

      - name: Set up Node
        if: steps.version.outputs.new_version
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.version.outputs.new_version
        run: npm ci

      # Build the renderer/main/preload, then package the mac app and publish it
      # to a GitHub Release tagged v<version>. Signs + notarizes when the signing
      # secrets are configured; otherwise builds unsigned (never hard-fails), so
      # releases work before the certs are set up.
      #
      # Required repo secrets for signing:
      #   MAC_CERTS                    base64 of the Developer ID Application .p12
      #   MAC_CERTS_PASSWORD           the .p12 export password
      #   APPLE_ID                     Apple account email (for notarization)
      #   APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID                10-char Apple Developer team id
      - name: Build and publish
        if: steps.version.outputs.new_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          npm run build
          if [ -n "$CSC_LINK" ]; then
            echo "Developer ID certificate present — signing + notarizing."
            npx electron-builder --mac --publish always \
              -c.mac.notarize=true \
              -c.extraMetadata.version="$VERSION"
          else
            echo "::warning::No MAC_CERTS secret set — building UNSIGNED. Add the signing secrets to enable signing + notarization."
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --publish always \
              -c.extraMetadata.version="$VERSION"
          fi

      # electron-builder uploaded everything to a DRAFT release; flip it public
      # now that the build/sign/notarize/upload all succeeded. This is what
      # actually creates the git tag (v<version>) on this commit.
      - name: Publish the release
        if: steps.version.outputs.new_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ steps.version.outputs.new_version }}" --draft=false --latest

      - name: Summary
        if: steps.version.outputs.new_version
        run: echo "Released v${{ steps.version.outputs.new_version }} to GitHub Releases." >> "$GITHUB_STEP_SUMMARY"
