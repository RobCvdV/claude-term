name: Release

# Build and publish to the GitHub Releases page on every push to main.
# Versioning is fully automatic from conventional-commit messages — feat → minor,
# fix → patch (BREAKING CHANGE → major) — so no version is ever edited in repo
# files. The computed version is injected into the build via electron-builder's
# extraMetadata; the tag + release are created by the publish step.
#
# Structure (three jobs) keeps the release single-tagged while fanning builds out
# across platforms:
#   version → compute the next semver ONCE and pre-create the draft release
#   build   → matrix (macOS arm64 / Windows / Linux); each uploads its own
#             artifacts into the SAME pre-created draft
#   publish → after all builds succeed, sanity-check, flip the draft public
#             (this mints the git tag), then prune blockmap-only leftovers
on:
  push:
    branches: [main]

permissions:
  contents: write # create tags and releases

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # Compute the next semver from commits since the last tag and pre-create the
  # draft the build matrix uploads into. dry_run means the tag is NOT created
  # here (publishing the draft mints it), so a failed build leaves no orphan
  # tag. default_bump: false skips the whole release when no feat/fix warrants
  # one (all downstream jobs are gated on the version output).
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags for version computation

      - name: Compute next version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false
          fetch_all_tags: true
          dry_run: true

      # Pre-create the draft release the build jobs upload into. Without a single
      # pre-existing draft, electron-builder's parallel uploads (now across three
      # OS runners) would race to CREATE the release and could split assets over
      # several same-tag drafts — the publish step then flips a coin on which
      # becomes public (v1.1.0 shipped blockmap-only that way). Creating a draft
      # does NOT create the git tag, so a failed build still leaves no orphan tag.
      - name: Pre-create draft release
        if: steps.version.outputs.new_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="v${{ steps.version.outputs.new_version }}"
          gh release view "$V" >/dev/null 2>&1 || \
            gh release create "$V" --draft --title "$V" --target "$GITHUB_SHA" --notes ""

  # Package each platform on its own runner (native modules like node-pty must be
  # built on the target OS) and upload into the shared draft. fail-fast:false so
  # one platform failing still lets the others finish; publish then won't run
  # (it `needs` this job) so a partial set never ships.
  build:
    needs: version
    if: needs.version.outputs.version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # One bash script for all three OSes (GitHub provides bash on Windows too).
      # macOS signs + notarizes when the Developer ID secrets are present, else
      # builds unsigned (never hard-fails). Windows/Linux build unsigned — the
      # signing env below is gated to the mac leg so electron-builder never tries
      # to sign a Windows exe with the macOS .p12.
      #
      # Required repo secrets for macOS signing:
      #   MAC_CERTS                    base64 of the Developer ID Application .p12
      #   MAC_CERTS_PASSWORD           the .p12 export password
      #   APPLE_ID                     Apple account email (for notarization)
      #   APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID                10-char Apple Developer team id
      - name: Build and publish (${{ matrix.platform }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CERTS || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CERTS_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          npm run build
          COMMON=(--publish always -c.extraMetadata.version="$VERSION")
          case "${{ matrix.platform }}" in
            mac)
              if [ -n "$CSC_LINK" ]; then
                echo "Developer ID certificate present — signing + notarizing."
                npx electron-builder --mac "${COMMON[@]}" -c.mac.notarize=true
              else
                echo "::warning::No MAC_CERTS secret set — building macOS UNSIGNED."
                CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac "${COMMON[@]}"
              fi
              ;;
            win)
              npx electron-builder --win "${COMMON[@]}"
              ;;
            linux)
              npx electron-builder --linux "${COMMON[@]}"
              ;;
          esac

  # All platforms uploaded into the draft; flip it public (this mints the git
  # tag v<version>) and prune any blockmap-only leftovers.
  publish:
    needs: [version, build]
    if: needs.version.outputs.version
    runs-on: ubuntu-latest
    steps:
      # Refuse to publish unless every platform's primary artifact made it into
      # the draft — guards against a split-race draft (blockmap-only) becoming
      # the public release. Since this job `needs` all build legs, a missing
      # asset here means an upload silently landed elsewhere.
      # This job has no checkout, so gh can't infer the repo from a git remote —
      # every gh call must name the repo explicitly (-R) or it dies with
      # "fatal: not a git repository".
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          V="v${{ needs.version.outputs.version }}"
          names=$(gh release view "$V" -R "$REPO" --json assets --jq '.assets[].name')
          for pat in '\.dmg$' '\.exe$' '\.AppImage$'; do
            echo "$names" | grep -q "$pat" || {
              echo "::error::draft $V is missing an asset matching /$pat/ — refusing to publish"
              echo "assets present:"; echo "$names"
              exit 1
            }
          done
          gh release edit "$V" -R "$REPO" --draft=false --latest

      # Belt for any remaining edge case: delete same-tag drafts ONLY when they
      # carry nothing but blockmaps. Deleting a draft destroys its assets — an
      # unconditional prune here is what wiped v1.1.0's real build. A draft
      # holding real assets is left in place with a warning to merge manually.
      - name: Prune duplicate draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="v${{ needs.version.outputs.version }}"
          gh api "repos/${{ github.repository }}/releases" \
            --jq ".[] | select(.tag_name==\"$V\" and .draft==true) |
                  [.id, ([.assets[].name | select(endswith(\".blockmap\") | not)] | length)] | @tsv" |
          while IFS=$'\t' read -r id realAssets; do
            if [ "$realAssets" -eq 0 ]; then
              echo "removing blockmap-only draft release $id"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
            else
              echo "::warning::same-tag draft $id still holds $realAssets real asset(s) — not deleting, merge manually"
            fi
          done

      - name: Summary
        run: echo "Released v${{ needs.version.outputs.version }} (macOS + Windows + Linux) to GitHub Releases." >> "$GITHUB_STEP_SUMMARY"
